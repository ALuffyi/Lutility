<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
<title>Lutility — Recherche rapide</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f1117;
    --bg2:     #161820;
    --bg3:     #1c1f2b;
    --bord:    #2a2d3a;
    --br:      #e2e4ef;
    --dim:     #6b7280;
    --dim2:    #9ca3af;
    --purple:  #a855f7;
    --blue:    #3b82f6;
    --green:   #22c55e;
    --mono:    'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  body {
    background: var(--bg);
    color: var(--br);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--bord);
    border-radius: 10px;
    overflow: hidden;
    user-select: none;
  }

  /* ── Barre de recherche ── */
  .search-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--bord);
    background: var(--bg2);
  }
  .search-ico { font-size: 16px; flex-shrink: 0; color: var(--dim); }
  #search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--br);
    font-size: 15px;
    font-family: inherit;
    caret-color: var(--purple);
  }
  #search-input::placeholder { color: var(--dim); }
  .search-hint {
    font-size: 10px;
    color: var(--dim);
    font-family: var(--mono);
    flex-shrink: 0;
  }

  /* ── Résultats ── */
  #results {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--bord) transparent;
  }
  #results::-webkit-scrollbar { width: 4px; }
  #results::-webkit-scrollbar-thumb { background: var(--bord); border-radius: 2px; }

  .section-label {
    font-size: 9px;
    font-family: var(--mono);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--dim);
    padding: 8px 16px 4px;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.08s;
    border-radius: 0;
  }
  .result-item:hover,
  .result-item.active { background: var(--bg3); }
  .result-item.active { border-left: 2px solid var(--purple); padding-left: 14px; }

  .result-ico {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    background: var(--bg3);
    border-radius: 6px;
  }
  .result-ico.note   { background: rgba(59,130,246,.12); }
  .result-ico.shortcut { background: rgba(168,85,247,.12); }
  .result-ico.script { background: rgba(34,197,94,.12); }

  .result-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 13px;
  }
  .result-tag {
    font-size: 9px;
    font-family: var(--mono);
    color: var(--dim);
    background: var(--bg3);
    border: 1px solid var(--bord);
    border-radius: 3px;
    padding: 1px 5px;
    flex-shrink: 0;
  }

  /* ── Footer ── */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    border-top: 1px solid var(--bord);
    background: var(--bg2);
  }
  .footer-keys { display: flex; gap: 10px; }
  .kbd {
    font-size: 9px;
    font-family: var(--mono);
    color: var(--dim);
    background: var(--bg3);
    border: 1px solid var(--bord);
    border-radius: 3px;
    padding: 1px 6px;
  }
  .footer-count { font-size: 10px; color: var(--dim); font-family: var(--mono); }

  .empty {
    padding: 40px 16px;
    text-align: center;
    color: var(--dim);
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="search-wrap">
  <span class="search-ico">🔍</span>
  <input id="search-input" type="text" placeholder="Rechercher une note, un raccourci, un script…" autocomplete="off" spellcheck="false">
  <span class="search-hint">ESC pour fermer</span>
</div>

<div id="results"></div>

<div class="footer">
  <div class="footer-keys">
    <span class="kbd">↑↓ Naviguer</span>
    <span class="kbd">↵ Ouvrir</span>
    <span class="kbd">ESC Fermer</span>
  </div>
  <span class="footer-count" id="result-count"></span>
</div>

<script>
  let _data = { notes: [], shortcuts: [], scripts: [] };
  let _filtered = [];
  let _activeIdx = -1;

  window.qs.onData(data => {
    _data = data;
    _renderResults('');
    document.getElementById('search-input').value = '';
    document.getElementById('search-input').focus();
  });

  document.getElementById('search-input').addEventListener('input', e => {
    _activeIdx = -1;
    _renderResults(e.target.value.trim().toLowerCase());
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { window.qs.close(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); _moveActive(1); return; }
    if (e.key === 'ArrowUp')   { e.preventDefault(); _moveActive(-1); return; }
    if (e.key === 'Enter') { e.preventDefault(); _activateItem(_activeIdx); return; }
  });

  function _filter(q) {
    const all = [
      ..._data.notes     || [],
      ..._data.shortcuts || [],
      ..._data.scripts   || [],
    ];
    if (!q) return all.slice(0, 30);
    return all.filter(item => {
      const name = (item.title || item.name || '').toLowerCase();
      return name.includes(q);
    }).slice(0, 30);
  }

  function _renderResults(q) {
    _filtered = _filter(q);
    const wrap = document.getElementById('results');
    const countEl = document.getElementById('result-count');

    if (!_filtered.length) {
      wrap.innerHTML = '<div class="empty">Aucun résultat</div>';
      countEl.textContent = '';
      return;
    }

    countEl.textContent = _filtered.length + ' résultat' + (_filtered.length > 1 ? 's' : '');

    // Grouper par type
    const groups = [
      { key: 'note',     label: '📝 Notes',      items: _filtered.filter(i => i.type === 'note') },
      { key: 'shortcut', label: '🔗 Raccourcis',  items: _filtered.filter(i => i.type === 'shortcut') },
      { key: 'script',   label: '⚙️ Scripts',    items: _filtered.filter(i => i.type === 'script') },
    ].filter(g => g.items.length);

    let globalIdx = 0;
    wrap.innerHTML = '';
    groups.forEach(g => {
      const sec = document.createElement('div');
      sec.className = 'section-label';
      sec.textContent = g.label;
      wrap.appendChild(sec);

      g.items.forEach(item => {
        const idx = globalIdx++;
        const div = document.createElement('div');
        div.className = 'result-item' + (idx === _activeIdx ? ' active' : '');
        div.dataset.idx = idx;

        const ico = document.createElement('div');
        ico.className = 'result-ico ' + item.type;
        ico.textContent = item.type === 'note' ? '📄' : (item.emoji || item.ico || (item.type === 'script' ? '⚙️' : '🔗'));

        const name = document.createElement('div');
        name.className = 'result-name';
        name.textContent = item.title || item.name;

        const tag = document.createElement('span');
        tag.className = 'result-tag';
        tag.textContent = item.type === 'note' ? 'note' : item.type === 'shortcut' ? 'raccourci' : 'script';

        div.appendChild(ico); div.appendChild(name); div.appendChild(tag);
        div.addEventListener('click', () => _activateItem(idx));
        div.addEventListener('mouseenter', () => { _activeIdx = idx; _updateActive(); });
        wrap.appendChild(div);
      });
    });
  }

  function _moveActive(dir) {
    if (!_filtered.length) return;
    _activeIdx = Math.max(0, Math.min(_filtered.length - 1, _activeIdx + dir));
    _updateActive();
    // Scroll into view
    const el = document.querySelector(`.result-item[data-idx="${_activeIdx}"]`);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }

  function _updateActive() {
    document.querySelectorAll('.result-item').forEach(el => {
      el.classList.toggle('active', +el.dataset.idx === _activeIdx);
    });
  }

  async function _activateItem(idx) {
    if (idx < 0 || idx >= _filtered.length) return;
    const item = _filtered[idx];
    if (item.type === 'note')     { window.qs.openNote(item.id); return; }
    if (item.type === 'shortcut') { await window.qs.launch(item.path); return; }
    if (item.type === 'script')   { await window.qs.launch(item.path); return; }
  }
</script>
</body>
</html>
